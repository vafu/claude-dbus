[package]
name = "claude-dbus"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "claude-dbus"
path = "src/main.rs"

[[bin]]
name = "claude-hook"
path = "src/claude_hook.rs"

[dependencies]
zbus = "5.0"
serde_json = "1.0"
tokio = { version = "1.0", features = ["rt-multi-thread", "macros", "io-util", "net", "sync"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
